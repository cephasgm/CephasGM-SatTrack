<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0e27">
    <title>CephasGM SatTrack | Offline</title>
    
    <style>
        :root {
            --bg-deep: #080c18;
            --text-primary: #e8ecf4;
            --text-secondary: #8892b0;
            --accent-cyan: #00d4ff;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', 'Segoe UI', -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        
        .offline-card {
            max-width: 450px;
        }
        
        .offline-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.8rem;
            color: #fff;
        }
        
        p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.2rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ffab00;
            animation: blink 1.5s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
        
        .btn {
            display: inline-block;
            padding: 0.7rem 2rem;
            background: var(--accent-cyan);
            color: #080c18;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn:hover {
            box-shadow: 0 6px 25px rgba(0, 212, 255, 0.4);
            transform: translateY(-2px);
        }
        
        .cached-pages {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .cached-pages h3 {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.8rem;
        }
        
        .cached-pages a {
            display: inline-block;
            margin: 0.3rem 0.5rem;
            color: var(--accent-cyan);
            text-decoration: none;
            font-size: 0.85rem;
        }
        
        .cached-pages a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">🛰️</div>
        
        <h1>You're Offline</h1>
        <p>
            Your ground terminal dashboard cannot be reached right now. 
            The connection will automatically restore when your network is back online.
        </p>
        
        <div class="status-indicator">
            <span class="dot"></span>
            Waiting for connection...
        </div>
        
        <br>
        
        <button class="btn" onclick="window.location.reload()">
            <i class="fas fa-sync-alt"></i> Try Again
        </button>
        
        <div class="cached-pages">
            <h3>Available Offline Pages</h3>
            <a href="/index.html">Home</a>
            <a href="/signin.html">Sign In</a>
            <a href="/signup.html">Sign Up</a>
            <a href="/dashboard.html">Dashboard</a>
        </div>
        
        <p style="margin-top: 1.5rem; font-size: 0.75rem; color: #555;">
            Copyright © 2025 Cephas GM | Innovating for Tomorrow
        </p>
    </div>
    
    <script>
        // Auto-reload when connection is restored
        window.addEventListener('online', () => {
            window.location.reload();
        });
        
        // Check connection status periodically
        setInterval(() => {
            if (navigator.onLine) {
                window.location.reload();
            }
        }, 5000);
    </script>
</body>
</html>
